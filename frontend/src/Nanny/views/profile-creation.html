<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Nanny Profile | NannyLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-navy: #0f172a;
            --accent-blue: #2563eb;
        }
        body {
            background-color: #f8fafc;
        }
        .bg-navy { background-color: var(--dark-navy); }
        .text-navy { color: var(--dark-navy); }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Smooth transition for sections */
        .form-section {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="bg-navy p-8 md:p-10 text-white">
            <h2 class="text-3xl font-extrabold tracking-tight">Profile Completion</h2>
            <p class="text-blue-200 mt-2 text-lg">Provide your professional details to start receiving bookings.</p>
            
            <div class="mt-10">
                <div class="flex justify-between mb-3 text-sm font-medium">
                    <span id="step-label">Step 1: Personal Information</span>
                    <span id="step-percent">50% Complete</span>
                </div>
                <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500 ease-out" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <form id="profileForm" class="p-8 md:p-10 space-y-8">
            
            <div id="section-1" class="form-section space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-navy">Full Name</label>
                        <input type="text" name="name" required placeholder="John Doe" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-navy">National ID Number</label>
                        <input type="text" name="national_id_number" required placeholder="12345678" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-navy">Physical Address</label>
                    <input type="text" name="address" required placeholder="Street, Apartment, City" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-navy">Years of Experience</label>
                        <input type="number" name="years_experience" required min="0" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-navy">Preferred Work Location</label>
                        <input type="text" name="preferred_location" placeholder="e.g. Nakuru, Nairobi" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <button type="button" onclick="nextStep()" 
                    class="w-full bg-navy text-white py-4 rounded-lg hover:bg-slate-800 font-bold text-lg shadow-lg transition-transform active:scale-[0.98]">
                    Continue to Documents <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div id="section-2" class="form-section hidden space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-navy">Professional Skills</label>
                    <textarea name="skills" rows="3" placeholder="First Aid, CPR, Infant Care, Cooking..." 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    <p class="text-xs text-gray-500 italic">Separate skills with commas.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 py-4">
                    <div class="p-4 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 hover:bg-blue-50 transition-colors">
                        <label class="block text-sm font-bold text-navy mb-2"><i class="fas fa-user-circle mr-2"></i>Profile Photo</label>
                        <input type="file" id="profile_image" accept="image/*" 
                            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
                    </div>
                    <div class="p-4 border-2 border-dashed border-gray-200 rounded-xl bg-gray-50 hover:bg-blue-50 transition-colors">
                        <label class="block text-sm font-bold text-navy mb-2"><i class="fas fa-id-card mr-2"></i>ID Card (Front View)</label>
                        <input type="file" id="id_image" accept="image/*" required 
                            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 pt-4">
                    <button type="button" onclick="prevStep()" 
                        class="w-full md:w-1/3 border-2 border-navy text-navy py-4 rounded-lg hover:bg-gray-100 font-bold">
                        <i class="fas fa-chevron-left mr-2"></i> Back
                    </button>
                    <button type="submit" id="submitBtn" 
                        class="w-full md:w-2/3 bg-blue-600 text-white py-4 rounded-lg hover:bg-blue-700 font-bold text-lg shadow-lg flex items-center justify-center gap-3">
                        Submit Profile <i class="fas fa-check-circle"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dql4taq0c/image/upload";
        const UPLOAD_PRESET = "Nanny_ids"; 
        
        function nextStep() {
            // Basic validation check for first section
            const requiredFields = document.querySelectorAll('#section-1 [required]');
            let allFilled = true;
            requiredFields.forEach(f => { if(!f.value) allFilled = false; });
            
            if(!allFilled) {
                alert("Please fill in all required fields.");
                return;
            }

            document.getElementById('section-1').classList.add('hidden');
            document.getElementById('section-2').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('step-label').innerText = "Step 2: Verification Documents";
            document.getElementById('step-percent').innerText = "100% Complete";
        }

        function prevStep() {
            document.getElementById('section-2').classList.add('hidden');
            document.getElementById('section-1').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = "50%";
            document.getElementById('step-label').innerText = "Step 1: Personal Information";
            document.getElementById('step-percent').innerText = "50% Complete";
        }

        async function uploadToCloudinary(file) {
            // 1. Compression Settings
            const options = {
                maxSizeMB: 2,          // Aim for under 2MB
                maxWidthOrHeight: 1920, // Standard HD resolution
                useWebWorker: true
            };

            try {
                console.log(`Original size: ${file.size / 1024 / 1024} MB`);
                
                // 2. Compress the file
                const compressedFile = await imageCompression(file, options);
                console.log(`Compressed size: ${compressedFile.size / 1024 / 1024} MB`);

                // 3. Upload the compressed version
                const formData = new FormData();
                formData.append('file', compressedFile);
                formData.append('upload_preset', UPLOAD_PRESET);
                
                const resp = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await resp.json();
                
                if (!resp.ok) throw new Error(data.error.message);
                return data.secure_url;

            } catch (error) {
                console.error("Compression/Upload Error:", error);
                throw error;
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            try {
                const idFile = document.getElementById('id_image').files[0];
                const profileFile = document.getElementById('profile_image').files[0];

                // 1. Upload to Cloudinary
                const idUrl = await uploadToCloudinary(idFile);
                let profileUrl = null;
                if (profileFile) {
                    profileUrl = await uploadToCloudinary(profileFile);
                }

                // 2. Format the Payload correctly for Pydantic
                const formData = new FormData(e.target);
                
                const payload = {
                    name: formData.get('name'),
                    national_id_number: formData.get('national_id_number'),
                    address: formData.get('address'),
                    // CRITICAL: Convert string to Number for the backend
                    years_experience: parseInt(formData.get('years_experience')), 
                    skills: formData.get('skills'),
                    preferred_location: formData.get('preferred_location') || null,
                    // Ensure this matches your Enum exactly (e.g., "FULL_TIME")
                    availability: "full_time", 
                    national_id_photo_url: idUrl,
                    profile_photo_url: profileUrl
                };

                // 3. Send to Backend
                const response = await fetch('http://127.0.0.1:8000/Nanny', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}` 
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    window.location.href = "nannydashboard.html";
                } else {
                    const errorDetail = await response.json();
                    console.log("Validation Error:", errorDetail);
                    alert("Submission failed. Check console for details.");
                }

            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
