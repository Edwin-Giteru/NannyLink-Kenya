<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>NannyLink Kenya | Family Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" />
  
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#00152f",
            "secondary": "#835500",
            "surface": "#f8f9fa",
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
    .ambient-shadow { box-shadow: 0px 15px 35px rgba(0, 21, 47, 0.08); }
    .dropdown-content { display: none; position: absolute; z-index: 50; }
    .dropdown-content.active { display: block; animation: slideDown 0.2s ease-out; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    @keyframes bounceIn {
      0% { opacity: 0; transform: translate(-50%, 100px); }
      100% { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>

<body class="bg-surface font-body text-slate-900">

<div id="checkoutBar" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-lg bg-primary text-white p-4 rounded-3xl shadow-2xl z-[100] flex justify-between items-center animate-bounce-in">
    <div class="pl-2">
        <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter">Selection Ready</p>
        <p class="font-black text-sm" id="selectionCountText">0 Nannies selected • KES 0</p>
    </div>
    <button onclick="openPaymentModal()" class="bg-secondary px-6 py-3 rounded-2xl font-black text-sm hover:scale-105 transition-all">
        Connect & Pay
    </button>
</div>

<div id="paymentModal" class="hidden fixed inset-0 z-[110] bg-primary/60 backdrop-blur-md items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative">
        <button onclick="closePaymentModal()" class="absolute top-6 right-6 text-slate-400"><span class="material-symbols-outlined">close</span></button>
        <h3 class="font-headline text-2xl font-black text-primary mb-2">Complete Connection</h3>
        <p class="text-slate-500 text-sm mb-6">Verify your M-Pesa number for the STK push.</p>
        
        <div class="bg-slate-50 rounded-2xl p-4 mb-6 flex justify-between items-center border border-slate-100">
            <span class="font-bold text-slate-600">Total Fee</span>
            <span class="text-xl font-black text-secondary" id="paymentAmountText">KES 0</span>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">M-Pesa Number</label>
                <input type="text" id="mpesaPhone" placeholder="2547XXXXXXXX" class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-secondary font-bold">
            </div>
            <button id="payNowBtn" onclick="initiateBatchPayment()" class="w-full bg-primary text-white py-4 rounded-2xl font-black shadow-lg hover:bg-slate-800 transition-all">
                <span id="payBtnText">Pay with M-Pesa</span>
            </button>
        </div>
    </div>
</div>

<div id="nannyModal" class="hidden fixed inset-0 z-[60] bg-primary/40 backdrop-blur-sm items-center justify-center p-4">
    <div class="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl relative max-h-[90vh] flex flex-col">
        <button onclick="closeNannyModal()" class="absolute top-6 right-6 z-10 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center shadow-sm">
            <span class="material-symbols-outlined text-primary">close</span>
        </button>
        
        <div class="overflow-y-auto no-scrollbar">
            <div class="relative h-64 w-full">
                <img id="modalImage" src="" class="w-full h-full object-cover" alt="Nanny Photo">
                <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-white to-transparent"></div>
            </div>
            
            <div class="p-8 pt-0 -mt-12 relative">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-black uppercase rounded-full mb-2 inline-block">Verified Caregiver</span>
                        <h2 id="modalName" class="font-headline text-3xl font-extrabold text-primary tracking-tight"></h2>
                        <p id="modalLocation" class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-2xl text-center">
                        <span class="material-symbols-outlined text-secondary block mb-1">history</span>
                        <span id="modalExp" class="text-primary font-bold block text-sm"></span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl text-center">
                        <span class="material-symbols-outlined text-secondary block mb-1">verified_user</span>
                        <span class="text-primary font-bold block text-sm">Vetted</span>
                    </div>
                </div>

                <div class="space-y-6 pb-6">
                    <div>
                        <h4 class="text-primary font-black text-[10px] uppercase tracking-widest mb-2">Skills</h4>
                        <div id="modalSkills" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="p-6 bg-white border-t border-slate-100 flex gap-4">
            <button onclick="closeNannyModal()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition-colors">Back</button>
            <button id="modalSelectBtn" class="flex-[2] text-white py-4 rounded-2xl font-extrabold shadow-xl transition-all"></button>
        </div>
    </div>
</div>

<header class="w-full top-0 sticky z-40 bg-white/90 backdrop-blur-md border-b border-slate-100 flex justify-between items-center px-6 py-4">
  <div class="flex items-center gap-3">
    <span class="text-2xl font-black text-primary font-headline tracking-tighter">NannyLink Kenya</span>
  </div>
  <div class="flex gap-4 items-center">
    <button onclick="logout()" class="text-slate-400 font-bold text-xs hover:text-red-500">Logout</button>
    <button onclick="window.location.href='edit-profile.html'" class="bg-primary text-white px-6 py-2.5 rounded-xl font-bold text-xs hover:scale-105 transition-all">
        Edit Profile
    </button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 pt-8 pb-32">
  <section class="mb-10">
    <h1 class="font-headline text-4xl font-extrabold text-primary tracking-tight mb-6">Find <span class="text-secondary italic">Care</span> nearby.</h1>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
      <div class="md:col-span-6 relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">search</span>
        <input type="text" id="searchInput" oninput="resetAndFetch()" class="w-full bg-white border-none rounded-2xl py-4 pl-12 shadow-sm focus:ring-2 focus:ring-primary/5 font-medium" placeholder="Search skills or names...">
      </div>

      <div class="md:col-span-6 relative">
        <button onclick="toggleDropdown('locationDropdown')" class="w-full bg-white border-none rounded-2xl py-4 px-5 shadow-sm flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-slate-400">location_on</span>
            <span class="font-bold text-slate-700 text-sm" id="currentLocationText">All Cities</span>
          </div>
          <span class="material-symbols-outlined text-slate-400">expand_more</span>
        </button>
        <div id="locationDropdown" class="dropdown-content top-full left-0 w-full mt-2 bg-white rounded-2xl shadow-xl border border-slate-100 p-2">
            <button class="w-full text-left px-4 py-3 hover:bg-slate-50 rounded-xl font-medium text-sm" onclick="selectLocation('All Cities')">All Cities</button>
            <button class="w-full text-left px-4 py-3 hover:bg-slate-50 rounded-xl font-medium text-sm" onclick="selectLocation('Nairobi')">Nairobi</button>
            <button class="w-full text-left px-4 py-3 hover:bg-slate-50 rounded-xl font-medium text-sm" onclick="selectLocation('Nakuru')">Nakuru</button>
        </div>
      </div>
    </div>
  </section>

  <section id="caregiverGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></section>
  
  <div class="mt-12 flex justify-center items-center gap-6">
    <button id="prevBtn" onclick="changePage(-1)" class="p-4 bg-white rounded-full shadow-sm disabled:opacity-30">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <span class="font-black text-primary text-sm uppercase tracking-widest" id="pageIndicator">Page 1</span>
    <button id="nextBtn" onclick="changePage(1)" class="p-4 bg-white rounded-full shadow-sm disabled:opacity-30">
        <span class="material-symbols-outlined">arrow_forward</span>
    </button>
  </div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl z-50 rounded-t-[2.5rem] border-t border-slate-100">
    <a href="contracts.html" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">description</span><span class="text-[9px] font-bold">Contracts</span></a>
    <a href="connections.html" class="flex flex-col items-center text-primary"><span class="material-symbols-outlined" >group</span><span class="text-[9px] font-black">My Connections</span></a>
    <a href="familydashboard.html" class="flex flex-col items-center text-primary"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span><span class="text-[9px] font-black">Find Nannies</span></a>
</nav>

<script>
    const API_BASE_URL = "http://localhost:8000";
    const LOGIN_PAGE_URL = "../views/login.html";
    
    let allNannies = []; 
    let selectedCity = "All Cities";
    let selectedNannyIds = new Set();
    
    let currentPage = 1;
    const itemsPerPage = 6;
    let hasMore = true;

    const CONNECTION_FEE = 1.0; 
    const MAX_SELECTION = 3;

    async function authenticatedFetch(url, options = {}) {
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = LOGIN_PAGE_URL;
            return;
        }

        const headers = {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            ...options.headers
        };

        try {
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) {
                localStorage.removeItem('access_token');
                window.location.href = LOGIN_PAGE_URL;
                return;
            }
            return response;
        } catch (error) {
            console.error("Network Error:", error);
            throw error;
        }
    }

    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = LOGIN_PAGE_URL;
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem('access_token')) {
            window.location.href = LOGIN_PAGE_URL;
            return;
        }
        fetchNannies();
    });

    async function fetchNannies() {
        const skip = (currentPage - 1) * itemsPerPage;
        const search = document.getElementById('searchInput').value;
        const city = selectedCity === "All Cities" ? "" : selectedCity;

        try {
            const response = await authenticatedFetch(`${API_BASE_URL}/nannies/?skip=${skip}&limit=${itemsPerPage}&search=${search}&location=${city}`);
            if (!response) return;
            const data = await response.json();
            allNannies = data;
            renderGrid(data);
            
            hasMore = data.length === itemsPerPage;
            document.getElementById('nextBtn').disabled = !hasMore;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('pageIndicator').textContent = `Page ${currentPage}`;
        } catch (error) {
            document.getElementById('caregiverGrid').innerHTML = `<p class="col-span-full text-center py-10 text-slate-400">Error loading data.</p>`;
        }
    }

    function renderGrid(data) {
        const grid = document.getElementById('caregiverGrid');
        if (!data || data.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-100"><p class="text-slate-400 font-bold">No results found.</p></div>`;
            return;
        }

        grid.innerHTML = data.map(nanny => {
            const isSelected = selectedNannyIds.has(nanny.id);
            return `
            <div class="group bg-white rounded-[2rem] overflow-hidden ambient-shadow border-2 transition-all duration-300 ${isSelected ? 'border-secondary' : 'border-transparent'}">
                <div onclick='openNannyModal(${JSON.stringify(nanny).replace(/'/g, "&apos;")})' class="relative h-56 cursor-pointer">
                    <img src="${nanny.profile_image || 'https://ui-avatars.com/api/?name='+nanny.full_name}" class="w-full h-full object-cover"/>
                </div>
                <div class="p-6">
                    <h3 class="font-headline text-lg font-extrabold text-primary">${nanny.full_name}</h3>
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-4">${nanny.current_location}</p>
                    <button onclick="toggleNannySelection('${nanny.id}')" class="w-full py-3 rounded-xl font-bold text-xs transition-all ${isSelected ? 'bg-secondary text-white' : 'bg-slate-50 text-primary hover:bg-slate-100'}">
                        ${isSelected ? 'Selected' : 'Connect'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function toggleNannySelection(id) {
        if (selectedNannyIds.has(id)) {
            selectedNannyIds.delete(id);
        } else {
            if (selectedNannyIds.size >= MAX_SELECTION) return alert("Select up to 3 only.");
            selectedNannyIds.add(id);
        }
        updateCheckoutBar();
        renderGrid(allNannies);
    }

    function updateCheckoutBar() {
        const bar = document.getElementById('checkoutBar');
        bar.classList.toggle('hidden', selectedNannyIds.size === 0);
        document.getElementById('selectionCountText').textContent = `${selectedNannyIds.size} Nannies • KES ${selectedNannyIds.size * CONNECTION_FEE}`;
    }

    function openNannyModal(nanny) {
        document.getElementById('modalImage').src = nanny.profile_image || `https://ui-avatars.com/api/?name=${nanny.full_name}`;
        document.getElementById('modalName').textContent = nanny.full_name;
        document.getElementById('modalLocation').textContent = nanny.current_location;
        document.getElementById('modalExp').textContent = `${nanny.experience_years} Yrs`;
        
        const skills = Array.isArray(nanny.skills) ? nanny.skills : (nanny.skills ? nanny.skills.split(',') : []);
        document.getElementById('modalSkills').innerHTML = skills.map(s => `<span class="px-3 py-1 bg-slate-50 text-[9px] font-bold uppercase rounded-lg text-slate-500">${s.trim()}</span>`).join('');

        const btn = document.getElementById('modalSelectBtn');
        const isSelected = selectedNannyIds.has(nanny.id);
        btn.textContent = isSelected ? "Remove Selection" : "Select Nanny";
        btn.className = `flex-[2] py-4 rounded-2xl font-extrabold shadow-xl ${isSelected ? 'bg-red-500 text-white' : 'bg-primary text-white'}`;
        btn.onclick = () => { toggleNannySelection(nanny.id); closeNannyModal(); };

        document.getElementById('nannyModal').classList.replace('hidden', 'flex');
    }

    function closeNannyModal() { document.getElementById('nannyModal').classList.replace('flex', 'hidden'); }
    function openPaymentModal() {
        document.getElementById('paymentAmountText').textContent = `KES ${selectedNannyIds.size * CONNECTION_FEE}`;
        document.getElementById('paymentModal').classList.replace('hidden', 'flex');
    }
    function closePaymentModal() { document.getElementById('paymentModal').classList.replace('flex', 'hidden'); }

    async function initiateBatchPayment() {
        const phone = document.getElementById('mpesaPhone').value;
        if (!/^254\d{9}$/.test(phone)) return alert("Format: 2547XXXXXXXX");

        const btn = document.getElementById('payNowBtn');
        btn.disabled = true;
        document.getElementById('payBtnText').textContent = "Processing...";

        try {
            const connectionIds = [];
            
            // Your backend expects nanny_id as a query parameter: /connections/?nanny_id=...
            for (let nannyId of selectedNannyIds) {
                const res = await authenticatedFetch(`${API_BASE_URL}/connections/?nanny_id=${nannyId}`, {
                    method: 'POST'
                });
                if (res && res.ok) {
                    const data = await res.json();
                    connectionIds.push(data.id);
                }
            }

            if (connectionIds.length === 0) throw new Error("Connection records failed to create.");

            // Payment route requires match_ids key
            const payRes = await authenticatedFetch(`${API_BASE_URL}/payments/initiate-batch`, {
                method: 'POST',
                body: JSON.stringify({ match_ids: connectionIds, phone_number: phone })
            });

            if (payRes && payRes.ok) {
                alert("STK Push sent successfully!");
                selectedNannyIds.clear();
                closePaymentModal();
                updateCheckoutBar();
                fetchNannies();
                // redirect to connections.html after short delay to show success message
                setTimeout(() => { window.location.href = 'connections.html'; }, 1500);
            } else {
                const errorData = await payRes.json();
                throw new Error(errorData.detail || "Payment initiation failed.");
            }
        } catch (err) {
            alert(err.message || "Something went wrong.");
        } finally {
            btn.disabled = false;
            document.getElementById('payBtnText').textContent = "Pay with M-Pesa";
        }
    }

    function selectLocation(loc) {
        selectedCity = loc;
        document.getElementById('currentLocationText').textContent = loc;
        closeAllDropdowns();
        resetAndFetch();
    }

    function toggleDropdown(id) {
        const d = document.getElementById(id);
        const isActive = d.classList.contains('active');
        closeAllDropdowns();
        if (!isActive) d.classList.add('active');
    }

    function closeAllDropdowns() { document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('active')); }
    function changePage(dir) { currentPage += dir; fetchNannies(); window.scrollTo(0,0); }
    function resetAndFetch() { currentPage = 1; fetchNannies(); }
</script>
</body>
</html>
