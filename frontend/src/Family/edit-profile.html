<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NannyLink | Edit Family Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" />
    
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '../views/login.html';

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00152f",
                        "secondary": "#835500",
                        "surface": "#f8f9fa",
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] }
                }
            }
        }
    </script>
    <style>
        :root { --primary: #00152f; --secondary: #835500; --surface: #f8f9fa; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    </style>
</head>

<body class="bg-[#f8f9fa] text-[#00152f] font-body antialiased pb-32">

    <header class="fixed top-0 w-full z-50 glass-nav border-b border-slate-100 h-16 flex items-center px-6 justify-between">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="flex items-center gap-2 text-primary/70 hover:text-primary transition-colors group">
                <span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
            </button>
            <div class="h-8 flex items-center border-l border-slate-200 pl-4">
                <img src="../../assets/images/logo.png" class="h-full w-auto object-contain" alt="Logo">
                <span class="ml-2 font-headline font-extrabold text-lg tracking-tight text-primary">NannyLink</span>
            </div>
        </div>
        <div class="w-10"></div> 
    </header>

    <main class="max-w-3xl mx-auto px-6 pt-28 pb-10">
        <form id="edit_family_form" class="space-y-6">
            
            <section class="bg-white rounded-[2.5rem] p-12 border border-slate-100 shadow-sm flex flex-col items-center">
                <div class="relative mb-6">
                    <div class="w-40 h-40 rounded-full overflow-hidden border-8 border-[#f8f9fa] shadow-inner ring-1 ring-slate-100 bg-[#00152f] flex items-center justify-center">
                        <img id="profile_preview" src="" class="hidden w-full h-full object-cover" />
                        <span id="initials_placeholder" class="text-white text-5xl font-black font-headline">--</span>
                    </div>                   
                </div>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Family Profile Picture</p>
            </section>

            <div class="bg-white rounded-[2.5rem] p-10 border border-slate-100 shadow-sm space-y-10">
                <div class="flex flex-col md:flex-row gap-4 items-start">
                    <label class="w-48 text-[10px] font-black text-slate-400 uppercase tracking-widest pt-4">Family Name:</label>
                    <input type="text" id="name" required 
                        class="flex-1 w-full rounded-xl border-slate-200 bg-white px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-[#835500]/20 focus:border-[#835500] transition-all" 
                        placeholder="Johnarto Family" />
                </div>

                <div class="flex flex-col md:flex-row gap-4 items-start">
                    <label class="w-48 text-[10px] font-black text-slate-400 uppercase tracking-widest pt-4">Household Location:</label>
                    <input type="text" id="household_location" required 
                        class="flex-1 w-full rounded-xl border-slate-200 bg-white px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-[#835500]/20 focus:border-[#835500] transition-all" 
                        placeholder="Nyali, Mombasa" />
                </div>

                <div class="flex flex-col md:flex-row gap-4 items-start">
                    <label class="w-48 text-[10px] font-black text-slate-400 uppercase tracking-widest pt-4">Household Details:</label>
                    <textarea id="household_details" rows="5" 
                        class="flex-1 w-full rounded-xl border-slate-200 bg-white px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-[#835500]/20 focus:border-[#835500] transition-all leading-relaxed" 
                        placeholder="Mention number of kids, bedrooms, specific nanny roles..."></textarea>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" id="save_btn" class="w-full bg-[#00152f] text-white py-5 rounded-[1.5rem] font-bold text-base shadow-2xl shadow-primary/20 hover:-translate-y-1 active:translate-y-0 transition-all flex items-center justify-center gap-3">
                    <span id="btn_text">Save Profile Changes</span>
                    <span id="spinner" class="hidden animate-spin material-symbols-outlined text-sm">progress_activity</span>
                </button>
            </div>
        </form>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-slate-100">
        <a href="contracts.html" class="flex flex-col items-center text-slate-400">
            <span class="material-symbols-outlined">description</span>
            <span class="text-[9px] font-bold uppercase mt-1">Contracts</span>
        </a>
        <a href="connections.html" class="flex flex-col items-center text-slate-400">
            <span class="material-symbols-outlined">payments</span>
            <span class="text-[9px] font-bold uppercase mt-1">Payments</span>
        </a>
        <a href="familydashboard.html" class="flex flex-col items-center text-[#00152f]">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="text-[9px] font-black uppercase mt-1">Profile</span>
        </a>
    </nav>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        async function loadCurrentData() {
            try {
                const response = await fetch(`${API_BASE}/families/profile/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error("Failed to load");
                
                const data = await response.json();
                document.getElementById('name').value = data.name || '';
                document.getElementById('household_location').value = data.household_location || '';
                document.getElementById('household_details').value = data.household_details || '';
                
                if (data.name) {
                    const initials = data.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    document.getElementById('initials_placeholder').innerText = initials;
                }
            } catch (err) {
                console.error("Load error:", err);
            }
        }

        document.getElementById('edit_family_form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save_btn');
            const btnText = document.getElementById('btn_text');
            const spinner = document.getElementById('spinner');

            btn.disabled = true;
            btnText.innerText = "Updating...";
            spinner.classList.remove('hidden');

            const payload = {
                name: document.getElementById('name').value,
                household_location: document.getElementById('household_location').value,
                household_details: document.getElementById('household_details').value
            };

            try {
                const response = await fetch(`${API_BASE}/families/profile/me`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    window.location.href = 'familydashboard.html';
                } else {
                    const error = await response.json();
                    alert(`Update failed: ${error.detail}`);
                }
            } catch (err) {
                alert("Network error. Is the backend running?");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Save Profile Changes";
                spinner.classList.add('hidden');
            }
        });

        loadCurrentData();
    </script>
</body>
</html>
