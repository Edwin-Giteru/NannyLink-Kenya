<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NannyLink | Contract Workspace</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#00152f", "secondary": "#835500", "surface": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] }
                },
            },
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #contractPDF { background: white; font-family: 'Inter', sans-serif; min-height: 11.23in; }
        .legal-header { border-bottom: 2px solid #00152f; padding-bottom: 1rem; margin-bottom: 2rem; }
        .legal-title { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #00152f; text-align: center; }
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #00152f; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
        .legal-list { list-style-type: none; counter-reset: item; }
        .legal-list > li { position: relative; padding-left: 2.5rem; margin-bottom: 1rem; font-size: 13px; line-height: 1.6; color: #334155; }
        .legal-list > li::before { content: counter(item) ". "; counter-increment: item; position: absolute; left: 0; font-weight: 800; color: #00152f; }
        .legal-term-label { font-weight: 700; text-transform: uppercase; color: #00152f; margin-right: 8px; }
    </style>
</head>

<body class="bg-surface font-body text-slate-900">

<header class="w-full sticky top-0 bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 px-6 py-3">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="h-8 flex items-center">
                <img src="../../assets/images/logo.png" class="h-full w-auto object-contain" alt="NannyLink Logo">
            </div>
            <span class="text-lg font-extrabold text-primary font-headline tracking-tighter">NannyLink Kenya</span>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 pt-8 pb-32">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-3 space-y-3">
            <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Connections</h3>
            <div id="matchList" class="space-y-2"></div>
        </div>

        <div class="lg:col-span-9">
            <div id="workspace" class="bg-white rounded-[2.5rem] border border-slate-100 shadow-xl min-h-[750px] flex flex-col overflow-hidden">
                <div class="flex-grow flex flex-col items-center justify-center p-12 text-slate-400">
                    <span class="material-symbols-outlined text-5xl mb-3 opacity-20">description</span>
                    <p class="text-sm">Select a connection to view or generate an agreement.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-slate-100">
    <a class="flex flex-col items-center justify-center text-primary px-5 py-2 transition-all" href="contracts.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">description</span>
        <span class="text-[10px] font-black tracking-wide uppercase mt-1">Contracts</span>
        <div class="w-1 h-1 bg-primary rounded-full mt-1"></div>
    </a>
    <a href="connections.html" class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-primary transition-all">
        <span class="material-symbols-outlined">payments</span>
        <span class="text-[10px] font-bold tracking-wide uppercase mt-1">Payments</span>
    </a>
    <a class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 hover:text-primary transition-all" href="familydashboard.html">
        <span class="material-symbols-outlined">group</span>
        <span class="text-[10px] font-bold tracking-wide uppercase mt-1">Connect</span>
    </a>
</nav>

<script>
    const API_CONTRACTS = "http://localhost:8000/contracts";
    const API_CONNECTIONS = "http://localhost:8000/connections"; 
    let successfulMatches = [];
    let existingContracts = [];

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = "../views/login.html";
            return;
        };
        try {
            const [cRes, ctRes] = await Promise.all([
                fetch(`${API_CONNECTIONS}/`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API_CONTRACTS}/me`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);
            
            if (cRes.status === 401 || ctRes.status === 401) {
                localStorage.removeItem('access_token');
                window.location.href = "../views/login.html";
                return;
            }

            successfulMatches = await cRes.json();
            existingContracts = await ctRes.json();
            renderMatches();
        } catch (e) { console.error("Initialization Error:", e); }
    }

    function renderMatches() {
        const list = document.getElementById('matchList');
        // Ensure data is an array before filtering
        const matches = Array.isArray(successfulMatches) ? successfulMatches : [];
        
        if (matches.length === 0) {
            list.innerHTML = `<p class="text-[10px] font-bold text-slate-400 text-center py-4 uppercase">No active connections</p>`;
            return;
        }

        list.innerHTML = matches.map(m => {
            const contract = existingContracts.find(c => c.match_id === m.id);
            // Accessing profile-level name directly as requested
            const name = m.nanny?.full_name || m.nanny?.name || "Caregiver";
            return `
                <div onclick="selectMatch('${m.id}')" class="bg-white p-4 rounded-2xl border border-slate-100 cursor-pointer hover:border-secondary transition-all group">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-primary truncate">${name}</span>
                        ${contract ? '<span class="material-symbols-outlined text-green-500 text-xs">verified</span>' : ''}
                    </div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${m.status.replace('_', ' ')}</p>
                </div>
            `;
        }).join('');
    }

    function selectMatch(matchId) {
        const match = successfulMatches.find(m => m.id === matchId);
        const contract = existingContracts.find(c => c.match_id === matchId);
        const workspace = document.getElementById('workspace');

        if (!contract) {
            const name = match.nanny?.full_name || match.nanny?.name || "Caregiver";
            workspace.innerHTML = `
                <div class="p-10 flex flex-col h-full bg-slate-50/30">
                    <h2 class="text-3xl font-headline font-black text-primary mb-2">New Agreement</h2>
                    <p class="text-xs text-slate-500 mb-8 font-bold uppercase tracking-widest">For: ${name}</p>
                    <textarea id="customTerms" class="flex-grow p-4 rounded-xl border-slate-200 bg-white text-sm focus:ring-primary focus:border-primary mb-6" 
                        placeholder="Specify house rules, special needs, working hours..."></textarea>
                    <button onclick="generateNow('${matchId}')" id="genBtn" class="bg-primary text-white py-4 rounded-xl font-bold transition-all">Generate Formal Contract</button>
                </div>`;
        } else {
            renderContractView(contract, match);
        }
    }

    async function generateNow(matchId) {
        const token = localStorage.getItem('access_token');
        const terms = document.getElementById('customTerms').value;
        const btn = document.getElementById('genBtn');
        btn.innerHTML = "Processing...";
        btn.disabled = true;
        try {
            const res = await fetch(`${API_CONTRACTS}/generate/${matchId}?custom_terms=${encodeURIComponent(terms)}`, {
                method: 'POST', 
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const newContract = await res.json();
            existingContracts.push(newContract);
            renderMatches();
            renderContractView(newContract, successfulMatches.find(m => m.id === matchId));
        } catch (e) { 
            alert("Error generating contract"); 
            btn.innerHTML = "Generate Formal Contract";
            btn.disabled = false;
        }
    }

    function renderContractView(contract, match) {
        const workspace = document.getElementById('workspace');
        let fullText = contract.contract_text || "";
        
        let householdExp = "Standard childcare services as per NannyLink guidelines.";
        if (fullText.includes("HOUSEHOLD EXPECTATIONS") && fullText.includes("SPECIAL JOB REQUIREMENTS")) {
            householdExp = fullText.split("HOUSEHOLD EXPECTATIONS")[1].split("SPECIAL JOB REQUIREMENTS")[0].trim();
        }

        let customRequirements = "Standard employment terms apply.";
        if (fullText.includes("SPECIAL JOB REQUIREMENTS") && fullText.includes("GENERAL PROVISIONS")) {
            customRequirements = fullText.split("SPECIAL JOB REQUIREMENTS")[1].split("GENERAL PROVISIONS")[0].trim();
        }

        const accurateNannyName = match.nanny?.full_name || match.nanny?.name || 'Caregiver Professional';

        workspace.innerHTML = `
            <div class="bg-primary p-4 text-white flex justify-between items-center no-print">
                <span class="text-xs font-bold uppercase tracking-widest opacity-80">Employment Agreement (Official)</span>
                <button onclick="downloadPDF()" class="bg-secondary px-4 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">download</span> Download PDF
                </button>
            </div>
            
            <div class="p-8 flex-grow overflow-y-auto bg-slate-100 hide-scrollbar">
                <div id="contractPDF" class="p-12 md:p-16 border border-slate-200 shadow-2xl relative mx-auto max-w-[850px] bg-white">
                    <div class="flex justify-between items-start border-b-2 border-primary pb-6 mb-8">
                        <div>
                            <h1 class="text-2xl font-black text-primary font-headline tracking-tighter">NannyLink Kenya</h1>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Premium Care & Household Staffing</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Date Generated</p>
                            <p class="text-sm font-bold text-primary">${contract.generation_date ? new Date(contract.generation_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '28 March 2026'}</p>
                        </div>
                    </div>

                    <h2 class="text-3xl font-black text-primary text-center mb-12 tracking-widest uppercase font-headline">Employment Agreement</h2>

                    <div class="mb-10">
                        <h3 class="text-secondary text-sm font-black uppercase mb-4 tracking-widest">1. Agreement Parties</h3>
                        <div class="grid grid-cols-2 gap-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Employer (Family)</p>
                                <p class="text-sm font-extrabold text-primary">${match.family?.name || 'Valued Family'}</p>
                                <p class="text-xs text-slate-500">${match.family?.household_location || 'Nairobi, Kenya'}</p>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Employee (Nanny)</p>
                                <p class="text-sm font-extrabold text-primary">${accurateNannyName}</p>
                                <p class="text-xs text-green-600 font-bold">Verified via NannyLink</p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-10">
                        <h3 class="text-secondary text-sm font-black uppercase mb-4 tracking-widest">2. Terms & Duties</h3>
                        <div class="space-y-6 text-sm text-slate-700 leading-relaxed">
                            <div>
                                <p class="text-[10px] font-black text-primary uppercase mb-2">Household Details & Expectations</p>
                                <p class="italic text-slate-600 border-l-4 border-slate-200 pl-4">${householdExp}</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-primary uppercase mb-2">Special Job Requirements</p>
                                <p class="italic text-slate-600 border-l-4 border-slate-200 pl-4">${customRequirements}</p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-12">
                        <h3 class="text-secondary text-sm font-black uppercase mb-4 tracking-widest">3. General Provisions</h3>
                        <ul class="space-y-3 text-xs text-slate-600">
                            <li class="flex gap-3"><span>1.</span> This contract is binding upon digital acceptance by both parties.</li>
                            <li class="flex gap-3"><span>2.</span> The Family agrees to provide a safe working environment.</li>
                            <li class="flex gap-3"><span>3.</span> Payment shall be handled via the NannyLink Secure Payment platform.</li>
                            <li class="flex gap-3"><span>4.</span> Either party may terminate with 14 days written notice.</li>
                        </ul>
                    </div>

                    <div class="mt-20 pt-10 border-t border-slate-100">
                        <p class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Acceptance & Digital Signatures</p>
                        <div class="grid grid-cols-2 gap-16">
                            <div class="text-center">
                                <div class="mb-4 flex justify-center">
                                    <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200">
                                        <span class="material-symbols-outlined text-3xl ${contract.acceptance?.family_accepted ? 'text-green-500' : 'text-slate-200'}">verified</span>
                                    </div>
                                </div>
                                <p class="text-[10px] font-black text-primary uppercase">Employer / Family</p>
                                <p class="text-xs italic ${contract.acceptance?.family_accepted ? 'text-green-600 font-bold' : 'text-slate-400'}">
                                    ${contract.acceptance?.family_accepted ? 'Digitally Signed' : 'Signature Pending'}
                                </p>
                            </div>
                            <div class="text-center">
                                <div class="mb-4 flex justify-center">
                                    <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center border border-slate-200">
                                        <span class="material-symbols-outlined text-3xl ${contract.acceptance?.nanny_accepted ? 'text-green-500' : 'text-slate-200'}">verified</span>
                                    </div>
                                </div>
                                <p class="text-[10px] font-black text-primary uppercase">Employee / Nanny</p>
                                <p class="text-xs italic ${contract.acceptance?.nanny_accepted ? 'text-green-600 font-bold' : 'text-slate-400'}">
                                    ${contract.acceptance?.nanny_accepted ? 'Digitally Signed' : 'Signature Pending'}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white border-t border-slate-100 flex justify-center no-print">
                ${(contract.acceptance?.family_accepted && contract.acceptance?.nanny_accepted) ? `
                    <div class="bg-green-50 text-green-600 px-10 py-4 rounded-2xl font-black flex items-center gap-3 border border-green-200 shadow-sm">
                        <span class="material-symbols-outlined font-bold">verified</span> Contract Fully Executed
                    </div>
                ` : contract.acceptance?.family_accepted ? `
                    <div class="text-slate-400 font-bold flex items-center gap-2 italic">
                        <span class="material-symbols-outlined">hourglass_empty</span> Waiting for Nanny to sign...
                    </div>
                ` : `
                    <button id="signBtn" onclick="signNow('${contract.id}')" class="bg-primary text-white px-20 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all flex items-center gap-3">
                        <span class="material-symbols-outlined">draw</span> Sign This Agreement
                    </button>
                `}
            </div>
        `;
    }

    function downloadPDF() {
        const element = document.getElementById('contractPDF');
        html2pdf().set({
            margin: 0,
            filename: 'NannyLink_Contract.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }

    async function signNow(id) {
        const token = localStorage.getItem('access_token');
        const signBtn = document.getElementById('signBtn');
        if (signBtn) {
            signBtn.disabled = true;
            signBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Processing...`;
        }
        try {
            const res = await fetch(`${API_CONTRACTS}/${id}/sign`, {
                method: 'POST', 
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const updated = await res.json();
                const idx = existingContracts.findIndex(c => c.id === id);
                if (idx !== -1) existingContracts[idx] = updated;
                renderContractView(updated, successfulMatches.find(m => m.id === updated.match_id));
                renderMatches(); 
            }
        } catch (e) {
            if (signBtn) {
                signBtn.disabled = false;
                signBtn.innerHTML = `<span class="material-symbols-outlined">draw</span> Sign This Agreement`;
            }
            alert("Signature failed.");
        }
    }
</script>
</body>
</html>
