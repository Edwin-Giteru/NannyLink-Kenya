<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NannyLink | Contract Workspace</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#00152f", "secondary": "#835500", "surface": "#f8f9fa" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] }
                },
            },
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #contractPDF { background: white; font-family: 'Inter', sans-serif; min-height: 11.23in; }
        .legal-header { border-bottom: 2px solid #00152f; padding-bottom: 1rem; margin-bottom: 2rem; }
        .legal-title { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #00152f; text-align: center; }
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #00152f; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
        .legal-list { list-style-type: none; counter-reset: item; }
        .legal-list > li { position: relative; padding-left: 2.5rem; margin-bottom: 1rem; font-size: 13px; line-height: 1.6; color: #334155; }
        .legal-list > li::before { content: counter(item) ". "; counter-increment: item; position: absolute; left: 0; font-weight: 800; color: #00152f; }
        .legal-term-label { font-weight: 700; text-transform: uppercase; color: #00152f; margin-right: 8px; }
    </style>
</head>

<body class="bg-surface font-body text-slate-900">

<header class="w-full sticky top-0 bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 px-6 py-3">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-sm">shield_with_heart</span>
            </div>
            <span class="text-lg font-extrabold text-primary font-headline tracking-tighter">NannyLink Kenya</span>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 pt-8 pb-32">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-3 space-y-3">
            <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Connections</h3>
            <div id="matchList" class="space-y-2"></div>
        </div>

        <div class="lg:col-span-9">
            <div id="workspace" class="bg-white rounded-[2.5rem] border border-slate-100 shadow-xl min-h-[750px] flex flex-col overflow-hidden">
                <div class="flex-grow flex flex-col items-center justify-center p-12 text-slate-400">
                    <span class="material-symbols-outlined text-5xl mb-3 opacity-20">description</span>
                    <p class="text-sm">Select a connection to view or generate an agreement.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const API_CONTRACTS = "http://localhost:8000/contracts";
    const API_CONNECTIONS = "http://localhost:8000/connections"; 
    let successfulMatches = [];
    let existingContracts = [];

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        const token = localStorage.getItem('access_token');
        if (!token) return;
        try {
            const [cRes, ctRes] = await Promise.all([
                fetch(`${API_CONNECTIONS}/`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API_CONTRACTS}/me`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);
            successfulMatches = await cRes.json();
            existingContracts = await ctRes.json();
            renderMatches();
        } catch (e) { console.error(e); }
    }

    function renderMatches() {
        const list = document.getElementById('matchList');
        const active = Array.isArray(successfulMatches) ? successfulMatches.filter(m => ['accepted', 'paid', 'awaiting_payment'].includes(m.status)) : [];
        list.innerHTML = active.map(m => {
            const contract = existingContracts.find(c => c.match_id === m.id);
            const name = m.nanny?.full_name || m.nanny?.name || "Caregiver";
            return `
                <div onclick="selectMatch('${m.id}')" class="bg-white p-4 rounded-2xl border border-slate-100 cursor-pointer hover:border-secondary transition-all group">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-primary truncate">${name}</span>
                        ${contract ? '<span class="material-symbols-outlined text-green-500 text-xs">verified</span>' : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function selectMatch(matchId) {
        const match = successfulMatches.find(m => m.id === matchId);
        const contract = existingContracts.find(c => c.match_id === matchId);
        const workspace = document.getElementById('workspace');

        if (!contract) {
            const name = match.nanny?.full_name || match.nanny?.name || "Caregiver";
            workspace.innerHTML = `
                <div class="p-10 flex flex-col h-full bg-slate-50/30">
                    <h2 class="text-3xl font-headline font-black text-primary mb-2">New Agreement</h2>
                    <p class="text-xs text-slate-500 mb-8 font-bold uppercase tracking-widest">For: ${name}</p>
                    <textarea id="customTerms" class="flex-grow p-4 rounded-xl border-slate-200 bg-white text-sm focus:ring-primary focus:border-primary mb-6" 
                        placeholder="Specify house rules, special needs, working hours..."></textarea>
                    <button onclick="generateNow('${matchId}')" id="genBtn" class="bg-primary text-white py-4 rounded-xl font-bold transition-all">Generate Formal Contract</button>
                </div>`;
        } else {
            renderContractView(contract, match);
        }
    }

    async function generateNow(matchId) {
        const token = localStorage.getItem('access_token');
        const terms = document.getElementById('customTerms').value;
        const btn = document.getElementById('genBtn');
        btn.innerHTML = "Processing...";
        try {
            const res = await fetch(`${API_CONTRACTS}/generate/${matchId}?custom_terms=${encodeURIComponent(terms)}`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
            });
            const newContract = await res.json();
            existingContracts.push(newContract);
            renderMatches();
            renderContractView(newContract, successfulMatches.find(m => m.id === matchId));
        } catch (e) { alert("Error"); btn.innerHTML = "Generate"; }
    }

    function renderContractView(contract, match) {
        const workspace = document.getElementById('workspace');
        
        // --- CLEANING LOGIC ---
        // 1. Take everything after "EXPECTATIONS" 
        // 2. Stop everything before "GENERAL PROVISIONS"
        let fullText = contract.contract_text || "";
        let cleanText = "";

        if (fullText.includes("EXPECTATIONS")) {
            cleanText = fullText.split("EXPECTATIONS")[1];
        } else if (fullText.includes("TERMS")) {
            cleanText = fullText.split("TERMS")[1];
        } else {
            cleanText = fullText;
        }

        // Strip out the repeated general provisions and dashes
        cleanText = cleanText.split("GENERAL PROVISIONS")[0]
                    .replace(/---/g, '')
                    .replace(/OF SERVICE/g, '')
                    .trim();

        workspace.innerHTML = `
            <div class="bg-primary p-4 text-white flex justify-between items-center no-print">
                <span class="text-xs font-bold uppercase tracking-widest opacity-80">Employment Agreement</span>
                <button onclick="downloadPDF()" class="bg-secondary px-4 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">download</span> Download PDF
                </button>
            </div>
            
            <div class="p-8 flex-grow overflow-y-auto bg-slate-200 hide-scrollbar">
                <div id="contractPDF" class="p-16 border border-slate-300 shadow-2xl relative mx-auto max-w-[800px] bg-white">
                    <div class="legal-header">
                        <h1 class="legal-title font-headline">Employment Agreement</h1>
                    </div>

                    <div class="space-y-4">
                        <h3 class="section-title">I. Parties</h3>
                        <ol class="legal-list">
                            <li><span class="legal-term-label">Employer:</span> ${match.family?.name || 'Hiring Family'}</li>
                            <li><span class="legal-term-label">Employee:</span> ${match.nanny?.full_name || match.nanny?.name || 'Caregiver'}</li>
                        </ol>

                        <h3 class="section-title">II. Duties & Requirements</h3>
                        <ol class="legal-list" style="counter-reset: item 2;">
                            <li><span class="legal-term-label">Primary Duties:</span>
                                <div class="mt-4 p-6 bg-slate-50 rounded-xl border border-slate-100 text-slate-600 leading-relaxed italic">
                                    ${cleanText || "Standard employment terms as per NannyLink guidelines."}
                                </div>
                            </li>
                        </ol>

                        <h3 class="section-title">III. General Provisions</h3>
                        <ol class="legal-list" style="counter-reset: item 3;">
                            <li>This contract is binding upon digital acceptance by both parties.</li>
                            <li>The Family agrees to provide a safe working environment.</li>
                            <li>Payment shall be handled via the NannyLink Secure Payment platform.</li>
                            <li>Either party may terminate with 14 days written notice.</li>
                        </ol>

                        <div class="mt-20 pt-10 border-t border-slate-200 grid grid-cols-2 gap-12">
                            <div class="text-center">
                                <div class="h-16 flex items-end justify-center border-b border-slate-300 mb-2">
                                    ${contract.acceptance?.family_accepted ? '<span class="font-bold italic text-primary">Digitally Signed</span>' : ''}
                                </div>
                                <p class="text-[9px] font-black uppercase text-slate-400 tracking-tighter">Employer Signature</p>
                            </div>
                            <div class="text-center">
                                <div class="h-16 flex items-end justify-center border-b border-slate-300 mb-2">
                                    ${contract.acceptance?.nanny_accepted ? '<span class="font-bold italic text-primary">Digitally Signed</span>' : ''}
                                </div>
                                <p class="text-[9px] font-black uppercase text-slate-400 tracking-tighter">Employee Signature</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white border-t border-slate-100 flex justify-center no-print">
                ${!contract.acceptance?.family_accepted ? `
                    <button onclick="signNow('${contract.id}')" class="bg-primary text-white px-16 py-4 rounded-2xl font-black shadow-xl hover:scale-105 transition-all">
                        Sign This Contract
                    </button>
                ` : `<div class="bg-green-50 text-green-600 px-10 py-3 rounded-2xl font-bold flex items-center gap-3 border border-green-200">
                      <span class="material-symbols-outlined">verified</span> Signature Recorded
                    </div>`}
            </div>
        `;
    }

    function downloadPDF() {
        const element = document.getElementById('contractPDF');
        html2pdf().set({
            margin: 0,
            filename: 'NannyLink_Contract.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    }

    async function signNow(id) {
        const token = localStorage.getItem('access_token');
        const res = await fetch(`${API_CONTRACTS}/${id}/sign`, {
            method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            const updated = await res.json();
            const idx = existingContracts.findIndex(c => c.id === id);
            existingContracts[idx] = updated;
            renderContractView(updated, successfulMatches.find(m => m.id === updated.match_id));
        }
    }
</script>
</body>
</html>
